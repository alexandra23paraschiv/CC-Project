<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cat Facts App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 2.5rem 3rem;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #4a90e2;
        }
        form {
            margin-bottom: 2rem;
        }
        button {
            background-color: #4a90e2;
            border: none;
            color: white;
            padding: 0.75rem 1.75rem;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.25s ease;
        }
        button:hover {
            background-color: #357abd;
        }
        h2 {
            color: #222;
            margin-top: 1.5rem;
            font-weight: 600;
        }
        p {
            background: #e9f0ff;
            border-left: 4px solid #4a90e2;
            padding: 1rem 1.25rem;
            border-radius: 6px;
            font-size: 1.15rem;
            line-height: 1.5;
            color: #444;
            user-select: text;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱 Random Cat Fact</h1>
        <form method="post" aria-label="Get a random cat fact">
            <button type="submit">Get a Cat Fact</button>
        </form>

        {% if cat_fact_en %}
            <h2>English:</h2>
            <p>{{ cat_fact_en }}</p>

            {% if cat_fact_ro %}
                <h2>Romanian:</h2>
                <p>{{ cat_fact_ro }}</p>
            {% endif %}
        {% endif %}
    </div>
</body>
</html>
